# 智能实训评价管理系统 - 本地开发依赖
# 仅用于本地开发；生产部署使用银河麒麟 + LoongArch 单机或集群方案

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: tes-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: tes
      POSTGRES_PASSWORD: tes
      POSTGRES_DB: tes_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tes -d tes_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tes-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: tes-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
