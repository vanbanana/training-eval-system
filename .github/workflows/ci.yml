name: Go Backend CI

on:
  push:
    branches: [main]
    paths:
      - "go-backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "go-backend/**"
      - ".github/workflows/ci.yml"

env:
  GO_VERSION: "1.25"

jobs:
  lint-build:
    name: Lint + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./go-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum

      - name: Go vet
        run: go vet ./...

      - name: Go fmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted: $unformatted"
            exit 1
          fi

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/server
