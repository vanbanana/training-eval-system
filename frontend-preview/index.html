  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.469.0/font/lucide.css" />
  <link rel="stylesheet" href="tokens.css" />

  <style>
    body { padding: 32px; min-height: 100vh; }
    .container { max-width: 1280px; margin: 0 auto; }
    h1 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 28px; font-weight: 700;
    }
    .subtitle {
      color: var(--muted-foreground);
      font-size: 14px;
      margin: 0 0 32px;
    }
    .group { margin-bottom: 32px; }
    .group-title {
      font-size: 13px; font-weight: 600;
      color: var(--muted-foreground);
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .item {
      display: flex; flex-direction: column; gap: 6px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }
    .item:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(30, 58, 95, 0.08);
    }
    .item-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted-foreground);
    }
    .item-name {
      font-size: 14px; font-weight: 600;
      color: var(--ink);
    }
    .item-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      margin-top: 4px;
      width: fit-content;
    }
    .item-tag.teacher { background: var(--primary-soft); color: var(--primary); }
    .item-tag.student { background: var(--accent-soft); color: var(--accent); }
    .item-tag.admin { background: var(--danger-soft); color: var(--danger); }
    .item-tag.shared { background: var(--gold-soft); color: var(--gold); }
    .item-tag.auth { background: var(--success-soft); color: var(--success); }
  </style>
</head>
