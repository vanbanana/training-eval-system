<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>忘记密码 · 智能实训评价管理系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.469.0/font/lucide.css" />
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <style>
    body { min-height: 100vh; background: var(--background); }
    .auth-wrap {
      display: grid;
      grid-template-columns: 1fr 560px;
      min-height: 100vh;
    }

    /* ========== Left brand panel ========== */
    .auth-left {
      background: var(--primary);
      padding: 64px 72px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      gap: 40px;
      color: #fff;
    }
    .brand {
      display: flex; align-items: center; gap: 14px;
    }
    .brand-mark-lg {
      width: 38px; height: 38px;
      background: #fff; color: var(--primary);
      border-radius: var(--radius-sm);
      display: grid; place-items: center;
      font-weight: 700; font-size: 18px;
    }
    .brand-meta { display: flex; flex-direction: column; gap: 2px; }
    .brand-meta-name {
      color: #fff; font-size: 15px; font-weight: 600;
    }
    .brand-meta-sub {
      color: #B8C5D6; font-size: 11px; letter-spacing: 1px;
    }

    .hero-title {
      color: #fff;
      font-size: 42px; font-weight: 700;
      line-height: 1.3;
      margin: 0;
    }
    .hero-desc {
      color: #B8C5D6;
      font-size: 14px; line-height: 1.8;
      margin: 18px 0 0;
      max-width: 480px;
    }

    .sec-note {
      background: #172B47;
      border: 1px solid #22344F;
      border-radius: var(--radius-md);
      padding: 18px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .sec-note-h {
      display: flex; align-items: center; gap: 8px;
      color: #fff; font-size: 13px; font-weight: 600;
    }
    .sec-note-h .icon { font-size: 14px; }
    .sec-note-desc {
      color: #B8C5D6;
      font-size: 12px; line-height: 1.7;
    }

    .auth-left-ftr {
      color: #8FA0B8;
      font-size: 12px;
    }

    /* ========== Right form panel ========== */
    .auth-right {
      background: var(--surface);
      padding: 64px 72px;
      display: flex; flex-direction: column;
      justify-content: center;
      gap: 24px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted-foreground);
      font-size: 12px; font-weight: 500;
      text-decoration: none;
      width: fit-content;
    }
    .back-link:hover { color: var(--ink); }
    .back-link .icon { font-size: 13px; }

    .form-hd h2 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 24px; font-weight: 700;
    }
    .form-hd p {
      margin: 0;
      color: var(--muted-foreground);
      font-size: 13px;
    }

    /* ========== Step indicator ========== */
    .steps {
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 14px;
      display: flex; align-items: center; justify-content: center;
      gap: 0;
    }
    .step {
      display: flex; align-items: center; gap: 6px;
    }
    .step-num {
      width: 24px; height: 24px;
      border-radius: var(--radius-pill);
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
    }
    .step.active .step-num {
      background: var(--primary);
      color: #fff;
    }
    .step.idle .step-num {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--muted-foreground);
    }
    .step-label { font-size: 12px; font-weight: 500; }
    .step.active .step-label { color: var(--primary); font-weight: 600; }
    .step.idle .step-label { color: var(--muted-foreground); }

    .step-line {
      width: 48px; height: 1px;
      margin: 0 12px;
    }
    .step-line.active { background: var(--border-strong); }
    .step-line.idle { background: var(--border); }

    /* ========== Form fields ========== */
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      color: var(--ink);
      font-size: 13px; font-weight: 500;
    }
    .field-input {
      height: 44px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      display: flex; align-items: center; gap: 10px;
    }
    .field-input .icon {
      color: var(--muted-foreground);
      font-size: 15px;
    }
    .field-input input {
      flex: 1;
      border: 0; outline: 0; background: transparent;
      font-size: 13px; font-family: inherit;
      color: var(--ink);
    }
    .field-input input::placeholder { color: var(--subtle-foreground); }
    .field-input.mono input { font-family: var(--font-mono); }
    .field-help {
      color: var(--muted-foreground);
      font-size: 11px;
    }

    .submit-btn {
      width: 100%;
      height: 46px;
      background: var(--primary);
      color: #fff;
      border: 0;
      border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: var(--primary-strong); }

    .form-hint {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 0;
      color: var(--muted-foreground);
      font-size: 12px;
    }
    .form-hint .icon { font-size: 13px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <!-- Left brand -->
    <aside class="auth-left">
      <div>
        <div class="brand">
          <div class="brand-mark-lg">训</div>
          <div class="brand-meta">
            <div class="brand-meta-name">实训评价管理系统</div>
            <div class="brand-meta-sub">找回密码 · Reset Password</div>
          </div>
        </div>
      </div>

      <div>
        <h1 class="hero-title">账户安全 ·<br/>找回您的访问权限</h1>
        <p class="hero-desc">我们将通过你绑定的学校邮箱发送一次性验证码。完成校验后即可设置新密码。</p>
      </div>

      <div class="sec-note">
        <div class="sec-note-h">
          <i class="icon icon-shield"></i>
          <span>密码安全要求</span>
        </div>
        <div class="sec-note-desc">长度 8 - 32 字符  ·  至少包含字母与数字两种类型  ·  不可与历史密码重复</div>
      </div>

      <div class="auth-left-ftr">© 2026 软件学院 · 教学信息化中心</div>
    </aside>

    <!-- Right form -->
    <main class="auth-right">
      <a class="back-link" href="01-login.html">
        <i class="icon icon-arrow-left"></i>
        <span>返回登录</span>
      </a>

      <div class="form-hd">
        <h2>重置密码</h2>
        <p>按以下三步完成密码重置</p>
      </div>

      <!-- step indicator -->
      <div class="steps">
        <div class="step active">
          <div class="step-num">1</div>
          <div class="step-label">验证身份</div>
        </div>
        <div class="step-line active"></div>
        <div class="step idle">
          <div class="step-num">2</div>
          <div class="step-label">输入验证码</div>
        </div>
        <div class="step-line idle"></div>
        <div class="step idle">
          <div class="step-num">3</div>
          <div class="step-label">设置新密码</div>
        </div>
      </div>

      <!-- field 1 -->
      <div class="field">
        <label class="field-label">账号</label>
        <div class="field-input">
          <i class="icon icon-user"></i>
          <input type="text" placeholder="请输入工号 / 学号" />
        </div>
      </div>

      <!-- field 2 -->
      <div class="field">
        <label class="field-label">绑定邮箱</label>
        <div class="field-input mono">
          <i class="icon icon-mail"></i>
          <input type="text" value="will****@univ.edu" readonly />
        </div>
        <div class="field-help">已自动匹配学校邮箱 · 验证码将发送至此邮箱</div>
      </div>

      <button class="submit-btn">发送验证码</button>

      <div class="form-hint">
        <i class="icon icon-life-buoy"></i>
        <span>无法收到邮件？联系教务处 010-****-2347</span>
      </div>
    </main>
  </div>
</body>
</html>
