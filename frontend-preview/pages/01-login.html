<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录 · 智能实训评价管理系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.469.0/font/lucide.css" />
  <link rel="stylesheet" href="../tokens.css" />
  <style>
    .layout {
      display: grid;
      grid-template-columns: 1fr 560px;
      min-height: 100vh;
    }
    .panel-left {
      background: var(--primary);
      color: #fff;
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .panel-right {
      background: var(--surface);
      padding: 0 72px;
      display: flex;
      align-items: center;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--primary);
      font-weight: 700;
      font-size: 18px;
    }
    .brand-row { display: flex; gap: 14px; align-items: center; }
    .brand-title {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }
    .brand-sub {
      color: #b8c5d6;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .hero-title {
      color: #fff;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.3;
      white-space: pre-line;
      margin: 0;
    }
    .hero-sub {
      color: #b8c5d6;
      font-size: 14px;
      line-height: 1.8;
      max-width: 480px;
      margin-top: 18px;
    }

    .footer-note {
      color: #8fa0b8;
      font-size: 12px;
    }

    .form-card {
      width: 100%;
      max-width: 416px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-head h1 {
      color: var(--ink);
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    .form-head p {
      color: var(--muted-foreground);
      font-size: 13px;
      margin: 0;
    }
    .divider { height: 1px; background: var(--border); width: 100%; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 12px 16px;
      font-size: 13px;
      color: var(--muted-foreground);
      cursor: pointer;
      position: relative;
    }
    .tab.active {
      color: var(--primary);
      font-weight: 600;
    }
    .tab.active::after {
      content: '';
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: -1px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .field-link {
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
    }
    .input {
      height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      transition: border-color 0.15s;
    }
    .input:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .input i { color: var(--muted-foreground); font-size: 15px; flex-shrink: 0; }
    .input input {
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 13px;
      width: 100%;
      color: var(--foreground);
      font-family: inherit;
    }
    .input input::placeholder { color: var(--subtle-foreground); }
    .input button {
      border: 0;
      background: transparent;
      cursor: pointer;
      color: var(--muted-foreground);
      padding: 0;
      display: grid;
      place-items: center;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--foreground);
    }
    .checkbox {
      width: 16px;
      height: 16px;
      border-radius: var(--radius-sm);
      background: var(--primary);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 11px;
    }
    .checkbox.unchecked {
      background: var(--surface);
      border: 1px solid var(--border-strong);
    }
    .checkbox.unchecked i { display: none; }

    .btn-primary {
      height: 46px;
      border: 0;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-primary:hover { background: var(--primary-strong); }

    .secure-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
      font-size: 12px;
      color: var(--muted-foreground);
    }
    .secure-hint i { color: var(--success); font-size: 13px; }

    /* 移动端兼容（赛题指 ≥1280px，但留好渐进降级） */
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .panel-left { padding: 32px; min-height: 200px; }
      .panel-right { padding: 32px; }
      .hero-title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- LEFT: brand panel -->
    <aside class="panel-left">
      <div class="brand-row">
        <div class="brand-mark">实</div>
        <div>
          <div class="brand-title">实训评价管理系统</div>
          <div class="brand-sub">Training Evaluation System</div>
        </div>
      </div>

      <div>
        <h2 class="hero-title">赋能教学评价 ·
沉淀实训数据</h2>
        <p class="hero-sub">以多维度评价、智能核查与教学画像，帮助教师减负增效，帮助学生看见自己的成长轨迹。</p>
      </div>

      <div class="footer-note">© 2026 软件学院 · 教学信息化中心</div>
    </aside>

    <!-- RIGHT: form -->
    <main class="panel-right">
      <form class="form-card" autocomplete="on">
        <div class="form-head">
          <h1>账号登录</h1>
          <p>请使用学校统一账号登录系统</p>
        </div>

        <div class="divider"></div>

        <div class="tabs">
          <div class="tab active">密码登录</div>
          <div class="tab">统一身份认证</div>
        </div>

        <div class="field">
          <label class="field-label">账号</label>
          <div class="input">
            <i class="icon icon-user"></i>
            <input type="text" placeholder="请输入工号 / 学号" autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <div class="field-label-row">
            <label class="field-label">密码</label>
            <a href="#" class="field-link">忘记密码？</a>
          </div>
          <div class="input">
            <i class="icon icon-lock"></i>
            <input type="password" placeholder="请输入密码" autocomplete="current-password" />
            <button type="button" aria-label="显示/隐藏密码"><i class="icon icon-eye-off"></i></button>
          </div>
        </div>

        <div class="checkbox-row">
          <span class="checkbox"><i class="icon icon-check"></i></span>
          <span>7 天内自动登录</span>
        </div>

        <button class="btn-primary" type="submit">登录</button>

        <div class="secure-hint">
          <i class="icon icon-shield-check"></i>
          <span>系统已启用 HTTPS · 登录数据加密传输</span>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
